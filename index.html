<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enrollment Portal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    header {
      background: #0b57d0;
      color: white;
      padding: 16px;
      text-align: center;
    }

    header h2 {
      margin: 0;
      font-size: 20px;
    }

    .container {
      padding: 12px;
      max-width: 1100px;
      margin: auto;
    }

    .filters {
      background: white;
      padding: 12px;
      border-radius: 10px;
      display: grid;
      gap: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, select, button {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      background: #0b57d0;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .count {
      margin: 10px 0;
      font-weight: bold;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .photo {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
      background: #ddd;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    .info {
      margin-top: 6px;
      font-size: 14px;
      color: #444;
    }

    .status {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 9px;
      border-radius: 20px;
      background: #e8f0fe;
      color: #0b57d0;
      font-size: 13px;
      font-weight: bold;
    }

    .loading {
      text-align: center;
      padding: 20px;
      font-weight: bold;
    }

    @media (min-width: 700px) {
      .filters {
        grid-template-columns: 2fr 1fr 1fr auto;
        align-items: center;
      }
    }
  </style>
</head>

<body>

<header>
  <h2>INDUS BRIGHT FUTURE SCHOOL SYSTEM</h2>
  <div>Enrollment Portal</div>
</header>

<div class="container">

  <div class="filters">
    <input type="text" id="search" placeholder="Search GR#, Student Name, Father Name">

    <select id="classFilter">
      <option value="">All Classes</option>
      <option value="I">I</option>
      <option value="II">II</option>
      <option value="III">III</option>
      <option value="IV">IV</option>
      <option value="V">V</option>
      <option value="VI">VI</option>
      <option value="VII">VII</option>
      <option value="VIII">VIII</option>
    </select>

    <select id="statusFilter">
      <option value="">All Status</option>
      <option value="New Enrollment">New Enrollment</option>
      <option value="Promoted">Promoted</option>
      <option value="Retained">Retained</option>
      <option value="Dropout">Dropout</option>
      <option value="Passout">Passout</option>
    </select>

    <button onclick="loadStudents()">Search</button>
  </div>

  <div class="count" id="count">Loading...</div>

  <div class="cards" id="cards"></div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxxxU35VnYrGP6GLeGczEhim__XQBy-YYhuJqHEcL1YA8q721h0DW2LXEGr0GdLtT1_/exec";

function loadStudents() {
  const search = document.getElementById("search").value.trim();
  const classFilter = document.getElementById("classFilter").value;
  const statusFilter = document.getElementById("statusFilter").value;

  document.getElementById("count").innerText = "Loading...";
  document.getElementById("cards").innerHTML = "";

  const url =
    API_URL +
    "?action=searchStudents" +
    "&search=" + encodeURIComponent(search) +
    "&classFilter=" + encodeURIComponent(classFilter) +
    "&statusFilter=" + encodeURIComponent(statusFilter);

  fetch(url)
    .then(res => res.json())
    .then(data => {
      if (!data.success) {
        document.getElementById("count").innerText = "Data load error";
        return;
      }

      showStudents(data.students);
    })
    .catch(err => {
      document.getElementById("count").innerText = "API error. Deployment access check ڪريو.";
      console.error(err);
    });
}

function showStudents(students) {
  const cards = document.getElementById("cards");
  const count = document.getElementById("count");

  count.innerText = "Total Records: " + students.length;
  cards.innerHTML = "";

  if (students.length === 0) {
    cards.innerHTML = "<div class='loading'>No student found</div>";
    return;
  }

  students.forEach(s => {
    const photo = s.photo || "https://via.placeholder.com/300x220?text=No+Photo";

    cards.innerHTML += `
      <div class="card">
        <img class="photo" src="${photo}" onerror="this.src='https://via.placeholder.com/300x220?text=No+Photo'">

        <div class="name">${s.name || ""}</div>

        <div class="info"><b>GR#:</b> ${s.grNo || ""}</div>
        <div class="info"><b>Father:</b> ${s.father || ""}</div>
        <div class="info"><b>Class:</b> ${s.currentClass || ""}</div>
        <div class="status">${s.status || ""}</div>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("keyup", function(e) {
  if (e.key === "Enter") loadStudents();
});

loadStudents();
</script>

</body>
</html>
