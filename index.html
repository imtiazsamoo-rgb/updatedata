<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBFS Enrollment Lite Portal</title>
<link rel="icon" href="data:,">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f5f7fb;color:#1f2937}
.container{max-width:1000px;margin:auto;padding:12px}
.card{background:#fff;border-radius:16px;box-shadow:0 8px 22px rgba(0,0,0,.08);overflow:hidden}
.header{background:#2563eb;color:#fff;padding:18px}
.header h1{margin:0;font-size:22px}
.header p{margin:6px 0 0;font-size:14px}
.panel{padding:14px;border-bottom:1px solid #e5e7eb}
.box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:14px}
.grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:760px){.grid.two{grid-template-columns:1fr 1fr}.grid.four{grid-template-columns:1.2fr 1fr 1fr 1fr}}
label{font-weight:bold;font-size:14px}
input,select,button,textarea{font:inherit}
input,select,textarea{width:100%;padding:11px;border:1px solid #d1d5db;border-radius:10px;background:#fff}
input[readonly]{background:#f3f4f6}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.btn{border:0;border-radius:10px;padding:11px 14px;font-weight:bold;cursor:pointer}
.btn-primary{background:#2563eb;color:#fff}.btn-success{background:#16a34a;color:#fff}.btn-warning{background:#f59e0b;color:#fff}.btn-danger{background:#dc2626;color:#fff}.btn-secondary{background:#e5e7eb;color:#111827}
.status{display:none;margin-top:12px;padding:12px;border-radius:10px;font-weight:bold}
.status.show{display:block}.info{background:#dbeafe;color:#1d4ed8}.success{background:#dcfce7;color:#166534}.error{background:#fee2e2;color:#991b1b}
.hidden{display:none!important}
.stats{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:760px){.stats{grid-template-columns:repeat(5,1fr)}}
.stat{padding:15px;border-radius:14px;color:#fff}.total{background:#1d4ed8}.male{background:#16a34a}.female{background:#db2777}.dropout{background:#ea580c}.passout{background:#7c3aed}
.stat .num{font-size:26px;font-weight:bold}
.badge{background:#e5e7eb;border-radius:999px;padding:7px 10px;font-weight:bold}
.student-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:10px;display:grid;grid-template-columns:64px 1fr;gap:10px;margin-top:10px;align-items:center}
@media(min-width:760px){.student-card{grid-template-columns:64px 1fr 160px}}
.student-thumb{width:64px;height:74px;background:#e5e7eb;border-radius:10px;overflow:hidden}
.student-thumb img{width:100%;height:100%;object-fit:cover}
.small{font-size:14px;line-height:1.6;color:#4b5563}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:10px;z-index:50}
.modal-inner{background:#fff;max-width:900px;width:100%;max-height:92vh;overflow:auto;border-radius:16px}
.table{width:100%;border-collapse:collapse;margin-top:10px}.table th,.table td{border:1px solid #ddd;padding:7px;font-size:13px}.table th{background:#eef3ff}
</style>
</head>

<body>
<div class="container">
<div class="card">

<div class="header">
<h1>Indus Bright Future School System</h1>
<p>Lite Enrollment Portal</p>
</div>

<div class="panel" id="loginPanel">
<div class="box">
<h3>School Login</h3>
<div class="grid two">
<div><label>User Name / Email</label><input id="username" autocomplete="username"></div>
<div><label>Password</label><input id="password" type="password" autocomplete="current-password"></div>
</div>
<div class="actions"><button class="btn btn-primary" onclick="loginUser()">Login</button></div>
<div id="loginStatus" class="status"></div>
</div>
</div>

<div id="appPanel" class="hidden">

<div class="panel">
<div class="actions">
<span class="badge">School Code: <span id="loggedInSchoolLabel"></span></span>
<span class="badge">User: <span id="loggedInUserLabel"></span></span>
<button class="btn btn-primary" onclick="showBrowser()">Student Browser</button>
<button class="btn btn-warning" onclick="showReports()">Reports</button>
<button class="btn btn-danger" onclick="logoutUser()">Logout</button>
</div>
<div id="mainStatus" class="status"></div>
</div>

<div class="panel" id="dashboardPanel">
<div class="stats">
<div class="stat total"><div>Enrollment</div><div class="num" id="totalCount">0</div></div>
<div class="stat male"><div>Male</div><div class="num" id="maleCount">0</div></div>
<div class="stat female"><div>Female</div><div class="num" id="femaleCount">0</div></div>
<div class="stat dropout"><div>Dropout</div><div class="num" id="dropoutCount">0</div></div>
<div class="stat passout"><div>Passout</div><div class="num" id="passoutCount">0</div></div>
</div>
<div id="classWiseBox"></div>
</div>

<div class="panel" id="browserPanel">
<div class="box">
<h3>Student Browser</h3>
<div class="grid four">
<div><label>Search GR / Student / Father</label><input id="searchText"></div>
<div>
<label>Class</label>
<select id="classFilter">
<option value="">All Classes</option>
<option>Kachi</option><option>ECCE</option><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option><option>VI</option><option>VII</option><option>VIII</option>
</select>
</div>
<div>
<label>Status</label>
<select id="statusFilter">
<option value="">All Status</option>
<option>New Enrollment</option><option>Promoted</option><option>Retained</option><option>Dropout</option><option>Passout</option>
</select>
</div>
<div>
<label>Limit</label>
<select id="limitFilter"><option>10</option><option>20</option><option>50</option></select>
</div>
</div>
<div class="actions"><button class="btn btn-primary" onclick="searchStudents()">Search</button></div>
<div class="small">Default صرف 10 cards ڏيکاريندو، وڌيڪ لاءِ search يا limit استعمال ڪريو.</div>
<div id="browserStatus" class="small"></div>
<div id="studentCards"></div>
</div>
</div>

<div class="panel hidden" id="reportsPanel">
<div class="box">
<h3>Download Reports PDF</h3>
<div class="grid two">
<div>
<label>Report Type</label>
<select id="reportType">
<option value="newEnrollment">New Enrollment List</option>
<option value="totalEnrollment">Total Enrollment List</option>
<option value="classWise">Class-wise Enrollment</option>
<option value="dropout">Dropout List</option>
<option value="passout">Passout List</option>
</select>
</div>
<div>
<label>Class for Class-wise</label>
<select id="reportClass">
<option value="">All / Select Class</option>
<option>Kachi</option><option>ECCE</option><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option><option>VI</option><option>VII</option><option>VIII</option>
</select>
</div>
</div>
<div class="actions">
<button class="btn btn-warning" onclick="downloadPdf()">Download PDF</button>
<button class="btn btn-secondary" onclick="showBrowser()">Back</button>
</div>
<div id="reportStatus" class="status"></div>
</div>
</div>

</div>
</div>
</div>

<div class="modal" id="detailModal">
<div class="modal-inner">
<div class="panel">
<h3>Student Detail / Edit</h3>
<div id="detailForm" class="grid two"></div>
<div class="actions">
<button id="saveBtn" class="btn btn-success" onclick="saveStudent()">Save</button>
<button class="btn btn-secondary" onclick="closeDetail()">Back</button>
</div>
<div id="detailStatus" class="status"></div>
</div>
</div>
</div>

<script>
const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxxxU35VnYrGP6GLeGczEhim__XQBy-YYhuJqHEcL1YA8q721h0DW2LXEGr0GdLtT1_/exec";

let currentUser = null;
let currentRecord = null;

function clean(v){return String(v||"").trim()}
function show(id){document.getElementById(id).classList.remove("hidden")}
function hide(id){document.getElementById(id).classList.add("hidden")}
function status(id,msg,type="info"){const e=document.getElementById(id);e.textContent=msg;e.className="status show "+type}
function clearStatus(id){const e=document.getElementById(id);if(e){e.textContent="";e.className="status"}}

async function postToScript(payload){
  const r = await fetch(APPS_SCRIPT_WEB_APP_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload)
  });
  const text = await r.text();
  if(text.trim().startsWith("<")) throw new Error("Apps Script deploy/access issue.");
  try{return JSON.parse(text)}catch(e){throw new Error("Invalid server response: "+text.substring(0,120))}
}

function basePayload(extra={}){
  return Object.assign({
    username: currentUser?.username || currentUser?.email || "",
    role: currentUser?.role || "School",
    loginSchoolCode: currentUser?.schoolCode || "",
    schoolCode: currentUser?.schoolCode || ""
  }, extra);
}

/* LOGIN */
async function loginUser(){
  clearStatus("loginStatus");
  const username=clean(document.getElementById("username").value);
  const password=clean(document.getElementById("password").value);
  if(!username||!password){status("loginStatus","User name ۽ password required آهن.","error");return}

  try{
    const res=await postToScript({action:"login",username,password});
    if(!res.success) throw new Error(res.message||"Login failed");

    currentUser=res.user;
    localStorage.setItem("IBFS_ENROLLMENT_USER",JSON.stringify(currentUser));

    document.getElementById("loggedInSchoolLabel").textContent=currentUser.schoolCode;
    document.getElementById("loggedInUserLabel").textContent=currentUser.name || currentUser.username;

    hide("loginPanel");
    show("appPanel");
    await loadDashboard();
    showBrowser();
    await searchStudents();
  }catch(e){status("loginStatus",e.message,"error")}
}

function logoutUser(){
  localStorage.removeItem("IBFS_ENROLLMENT_USER");
  location.reload();
}

async function autoLogin(){
  const saved=localStorage.getItem("IBFS_ENROLLMENT_USER");
  if(!saved)return;
  try{
    currentUser=JSON.parse(saved);
    document.getElementById("loggedInSchoolLabel").textContent=currentUser.schoolCode;
    document.getElementById("loggedInUserLabel").textContent=currentUser.name || currentUser.username;
    hide("loginPanel");show("appPanel");
    await loadDashboard();showBrowser();await searchStudents();
  }catch(e){}
}

/* DASHBOARD */
async function loadDashboard(){
  try{
    const res=await postToScript(basePayload({action:"dashboard"}));
    if(!res.success)throw new Error(res.message||"Dashboard failed");
    document.getElementById("totalCount").textContent=res.total||0;
    document.getElementById("maleCount").textContent=res.male||0;
    document.getElementById("femaleCount").textContent=res.female||0;
    document.getElementById("dropoutCount").textContent=res.dropout||0;
    document.getElementById("passoutCount").textContent=res.passout||0;

    const box=document.getElementById("classWiseBox");
    const cw=res.classWise||{};
    let html="<table class='table'><tr><th>Class</th><th>Male</th><th>Female</th><th>Total</th></tr>";
    Object.keys(cw).sort().forEach(k=>{
      html+=`<tr><td>${k}</td><td>${cw[k].male}</td><td>${cw[k].female}</td><td>${cw[k].total}</td></tr>`;
    });
    html+="</table>";
    box.innerHTML=html;
  }catch(e){status("mainStatus",e.message,"error")}
}

function showBrowser(){show("dashboardPanel");show("browserPanel");hide("reportsPanel");clearStatus("mainStatus")}
function showReports(){hide("browserPanel");show("reportsPanel")}

/* SEARCH */
async function searchStudents(){
  const box=document.getElementById("studentCards");
  const msg=document.getElementById("browserStatus");
  box.innerHTML="";
  msg.textContent="Loading...";

  try{
    const res=await postToScript(basePayload({
      action:"search",
      search:document.getElementById("searchText").value,
      classFilter:document.getElementById("classFilter").value,
      statusFilter:document.getElementById("statusFilter").value,
      limit:document.getElementById("limitFilter").value
    }));

    if(!res.success)throw new Error(res.message||"Search failed");
    msg.textContent="Records: "+res.students.length;

    if(!res.students.length){
      box.innerHTML="<div class='small'>No student found.</div>";
      return;
    }

    res.students.forEach(s=>{
      const img=s.photo?`<img src="${s.photo}" onerror="this.style.display='none'">`:"";
      box.innerHTML+=`
      <div class="student-card">
        <div class="student-thumb">${img}</div>
        <div>
          <b>${s.name||""}</b>
          <div class="small">
            Father: ${s.father||""}<br>
            GR No: ${s.grNo||""} | Class: ${s.currentClass||""}<br>
            Status: ${s.status||""}
          </div>
        </div>
        <div class="actions" style="margin-top:0">
          <button class="btn btn-primary" onclick="openDetail('${String(s.uniqueKey).replace(/'/g,"&#39;")}')">View/Edit</button>
        </div>
      </div>`;
    });
  }catch(e){msg.textContent=e.message}
}

/* DETAIL / EDIT */
async function openDetail(uniqueKey){
  clearStatus("detailStatus");
  try{
    const res=await postToScript(basePayload({action:"detail",uniqueKey}));
    if(!res.success)throw new Error(res.message||"Not found");
    currentRecord=res.record;
    renderDetail();
    document.getElementById("detailModal").style.display="flex";
  }catch(e){status("mainStatus",e.message,"error")}
}

function renderDetail(){
  const editable=!!currentUser.canEdit;
  document.getElementById("saveBtn").style.display=editable?"inline-block":"none";

  const fields=[
    "UniqueKey","SchoolCode","NewSchoolCode","GRNo","StudentName","FatherGuardianName",
    "Gender","DOB","BFormNo","ClassAdmitted","CurrentClass","Religion","ResidentialAddress",
    "ParentCNIC","ParentContact","EmergencyContact","DateOfAdmission","Shift","Status","Remarks"
  ];

  let html="";
  if(currentRecord.PhotoThumb){
    html+=`<div><label>Photo</label><div class="student-thumb" style="width:100px;height:120px"><img src="${currentRecord.PhotoThumb}"></div></div>`;
  }

  fields.forEach(f=>{
    const ro=(!editable || ["UniqueKey","SchoolCode","NewSchoolCode","GRNo"].includes(f))?"readonly":"";
    if(f==="Status" && editable && currentUser.canChangeStatus){
      html+=`<div><label>${f}</label><select id="f_${f}">
        ${["New Enrollment","Promoted","Retained","Dropout","Passout"].map(x=>`<option ${currentRecord[f]===x?"selected":""}>${x}</option>`).join("")}
      </select></div>`;
    }else if((f==="CurrentClass" || f==="ClassAdmitted") && editable){
      html+=`<div><label>${f}</label><select id="f_${f}">
        ${["Kachi","ECCE","I","II","III","IV","V","VI","VII","VIII"].map(x=>`<option ${currentRecord[f]===x?"selected":""}>${x}</option>`).join("")}
      </select></div>`;
    }else if((f==="DOB" || f==="DateOfAdmission") && editable){
      html+=`<div><label>${f}</label><input type="date" id="f_${f}" value="${currentRecord[f]||""}" ${ro}></div>`;
    }else{
      html+=`<div><label>${f}</label><input id="f_${f}" value="${String(currentRecord[f]||"").replace(/"/g,"&quot;")}" ${ro}></div>`;
    }
  });

  document.getElementById("detailForm").innerHTML=html;
}

async function saveStudent(){
  if(!currentUser.canEdit){status("detailStatus","Edit permission denied.","error");return}
  const student={UniqueKey:currentRecord.UniqueKey};
  document.querySelectorAll("[id^='f_']").forEach(el=>{
    const key=el.id.replace("f_","");
    student[key]=el.value;
  });

  try{
    const res=await postToScript(basePayload({
      action:"update",
      canEdit:currentUser.canEdit,
      student
    }));
    if(!res.success)throw new Error(res.message||"Save failed");
    status("detailStatus",res.message||"Saved.","success");
    await loadDashboard();
    await searchStudents();
  }catch(e){status("detailStatus",e.message,"error")}
}

function closeDetail(){document.getElementById("detailModal").style.display="none"}

/* PDF */
function base64ToBlob(base64,type){
  const bin=atob(base64);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type});
}

async function downloadPdf(){
  if(!currentUser.canDownload){status("reportStatus","Download permission denied.","error");return}
  try{
    status("reportStatus","Preparing PDF...","info");
    const res=await postToScript(basePayload({
      action:"downloadpdf",
      reportType:document.getElementById("reportType").value,
      classFilter:document.getElementById("reportClass").value
    }));
    if(!res.success)throw new Error(res.message||"PDF failed");
    const blob=base64ToBlob(res.pdfBase64,"application/pdf");
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=res.fileName||"report.pdf";
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    status("reportStatus","PDF downloaded.","success");
  }catch(e){status("reportStatus","PDF failed: "+e.message,"error")}
}

document.getElementById("searchText").addEventListener("keyup",e=>{if(e.key==="Enter")searchStudents()});
autoLogin();
</script>
</body>
</html>
