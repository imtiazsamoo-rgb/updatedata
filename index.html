<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBFS Enrollment Lite Portal</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f5f7fb;color:#1f2937}
.container{max-width:1000px;margin:auto;padding:12px}
.card{background:#fff;border-radius:16px;box-shadow:0 8px 22px rgba(0,0,0,.08);overflow:hidden}
.header{background:#2563eb;color:#fff;padding:18px}
.header h1{margin:0;font-size:22px}
.header p{margin:6px 0 0;font-size:14px}
.panel{padding:14px;border-bottom:1px solid #e5e7eb}
.box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:14px}
.grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:760px){.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:1fr 1fr 1fr}}
label{font-weight:bold;font-size:14px}
input,select,button{font:inherit}
input,select{width:100%;padding:11px;border:1px solid #d1d5db;border-radius:10px;background:#fff}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.btn{border:0;border-radius:10px;padding:11px 14px;font-weight:bold;cursor:pointer}
.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#16a34a;color:#fff}
.btn-warning{background:#f59e0b;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-secondary{background:#e5e7eb;color:#111827}
.status{display:none;margin-top:12px;padding:12px;border-radius:10px;font-weight:bold}
.status.show{display:block}
.info{background:#dbeafe;color:#1d4ed8}
.success{background:#dcfce7;color:#166534}
.error{background:#fee2e2;color:#991b1b}
.hidden{display:none!important}
.stats{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:760px){.stats{grid-template-columns:repeat(5,1fr)}}
.stat{padding:16px;border-radius:14px;color:#fff}
.total{background:#1d4ed8}.male{background:#16a34a}.female{background:#db2777}.dropout{background:#dc2626}.passout{background:#6b7280}
.stat .num{font-size:28px;font-weight:bold}
.student-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px;display:grid;grid-template-columns:70px 1fr;gap:12px;margin-top:12px}
@media(min-width:760px){.student-card{grid-template-columns:70px 1fr 180px}}
.student-thumb{width:70px;height:70px;background:#e5e7eb;border-radius:50%;overflow:hidden}
.student-thumb img{width:100%;height:100%;object-fit:cover}
.small{font-size:14px;line-height:1.6;color:#4b5563}
.badge{background:#e5e7eb;border-radius:999px;padding:7px 10px;font-weight:bold}
table{width:100%;border-collapse:collapse;background:#fff;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;font-size:13px}
th{background:#dbeafe}
</style>
</head>

<body>
<div class="container">
<div class="card">

<div class="header">
<h1>Indus Bright Future School System</h1>
<p>School Enrollment Lite Portal</p>
</div>

<div class="panel" id="loginPanel">
<div class="box">
<h3>School Login</h3>
<div class="grid two">
<div><label>User Name / Email</label><input id="username" autocomplete="username"></div>
<div><label>Password</label><input id="password" type="password"></div>
</div>
<div class="actions">
<button class="btn btn-primary" onclick="loginUser()">Login</button>
</div>
<div id="loginStatus" class="status"></div>
</div>
</div>

<div id="appPanel" class="hidden">

<div class="panel">
<div class="actions">
<span class="badge">School Code: <span id="loggedInSchoolLabel"></span></span>
<button class="btn btn-primary" onclick="showDashboard()">Dashboard</button>
<button class="btn btn-success" onclick="showSearch()">Search Student</button>
<button class="btn btn-warning" onclick="showReports()">Download Reports</button>
<button class="btn btn-danger" onclick="logoutUser()">Logout</button>
</div>
<div id="mainStatus" class="status"></div>
</div>

<div class="panel" id="dashboardPanel">
<div class="stats">
<div class="stat total"><div>Enrollment</div><div class="num" id="totalCount">0</div></div>
<div class="stat male"><div>Male</div><div class="num" id="maleCount">0</div></div>
<div class="stat female"><div>Female</div><div class="num" id="femaleCount">0</div></div>
<div class="stat dropout"><div>Dropout</div><div class="num" id="dropoutCount">0</div></div>
<div class="stat passout"><div>Passout</div><div class="num" id="passoutCount">0</div></div>
</div>
<div id="classWiseBox"></div>
</div>

<div class="panel hidden" id="searchPanel">
<div class="box">
<h3>Search / Filter Students</h3>
<div class="grid three">
<div><label>Search GR / Name / Father</label><input id="searchText"></div>
<div>
<label>Class</label>
<select id="classFilter">
<option value="">All Classes</option>
<option>Kachi</option><option>ECCE</option><option>I</option><option>II</option>
<option>III</option><option>IV</option><option>V</option><option>VI</option>
<option>VII</option><option>VIII</option>
</select>
</div>
<div>
<label>Status</label>
<select id="statusFilter">
<option value="">All Status</option>
<option>New Enrollment</option>
<option>Promoted</option>
<option>Retained</option>
<option>Dropout</option>
<option>Passout</option>
</select>
</div>
</div>
<div class="actions">
<button class="btn btn-primary" onclick="searchStudents()">Search</button>
<button class="btn btn-secondary" onclick="showDashboard()">Back</button>
</div>
<div id="searchStatus" class="small"></div>
<div id="searchResultCard"></div>
</div>
</div>

<div class="panel hidden" id="reportsPanel">
<div class="box">
<h3>Download Reports</h3>
<div class="grid two">
<div>
<label>Class for Class-wise Report</label>
<select id="reportClass">
<option value="">Select Class</option>
<option>Kachi</option><option>ECCE</option><option>I</option><option>II</option>
<option>III</option><option>IV</option><option>V</option><option>VI</option>
<option>VII</option><option>VIII</option>
</select>
</div>
</div>
<div class="actions">
<button class="btn btn-warning" onclick="downloadPdf('newEnrollment')">New Enrollment PDF</button>
<button class="btn btn-warning" onclick="downloadPdf('totalEnrollment')">Total Enrollment PDF</button>
<button class="btn btn-warning" onclick="downloadPdf('classWise')">Class-wise PDF</button>
<button class="btn btn-warning" onclick="downloadPdf('dropout')">Dropout PDF</button>
<button class="btn btn-warning" onclick="downloadPdf('passout')">Passout PDF</button>
<button class="btn btn-secondary" onclick="showDashboard()">Back</button>
</div>
</div>
</div>

<form id="studentForm" class="hidden" onsubmit="saveStudent(event)">
<input type="hidden" id="uniqueKey">

<div class="panel">
<h3 id="formTitle">Student Detail</h3>

<div class="grid two">
<div><label>School Code</label><input id="schoolCode" readonly></div>
<div><label>New School Code</label><input id="newSchoolCode" readonly></div>
<div><label>GR No</label><input id="grNo"></div>
<div><label>Student Name</label><input id="studentName"></div>
<div><label>Father / Guardian Name</label><input id="fatherName"></div>
<div>
<label>Gender</label>
<select id="gender"><option></option><option>Male</option><option>Female</option></select>
</div>
<div><label>DOB</label><input id="dob" type="date"></div>
<div><label>B Form No</label><input id="bFormNo"></div>
<div>
<label>Class Admitted</label>
<select id="classAdmitted">
<option></option><option>Kachi</option><option>ECCE</option><option>I</option><option>II</option>
<option>III</option><option>IV</option><option>V</option><option>VI</option>
<option>VII</option><option>VIII</option>
</select>
</div>
<div>
<label>Current Class</label>
<select id="currentClass">
<option></option><option>Kachi</option><option>ECCE</option><option>I</option><option>II</option>
<option>III</option><option>IV</option><option>V</option><option>VI</option>
<option>VII</option><option>VIII</option>
</select>
</div>
<div>
<label>Religion</label>
<select id="religion"><option></option><option>Islam</option><option>Hindu</option><option>Christian</option></select>
</div>
<div><label>Parent CNIC</label><input id="parentCnic"></div>
<div><label>Parent Contact</label><input id="parentContact"></div>
<div><label>Emergency Contact</label><input id="emergencyContact"></div>
<div><label>Date of Admission</label><input id="dateOfAdmission" type="date"></div>
<div>
<label>Shift</label>
<select id="shift"><option></option><option>Morning</option><option>Evening</option></select>
</div>
<div>
<label>Status</label>
<select id="status">
<option>New Enrollment</option>
<option>Promoted</option>
<option>Retained</option>
<option>Dropout</option>
<option>Passout</option>
</select>
</div>
<div><label>Photo URL</label><input id="photoUrl"></div>
</div>

<div style="margin-top:12px">
<label>Residential Address</label>
<input id="address">
</div>

<div style="margin-top:12px">
<label>Remarks</label>
<input id="remarks">
</div>

<div id="formStatus" class="status"></div>
<div class="actions">
<button class="btn btn-success" type="submit">Save</button>
<button class="btn btn-secondary" type="button" onclick="showSearch()">Back</button>
</div>
</div>
</form>

</div>
</div>
</div>

<script>
const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxxxU35VnYrGP6GLeGczEhim__XQBy-YYhuJqHEcL1YA8q721h0DW2LXEGr0GdLtT1_/exec";

let loggedInSchoolCode = "";
let currentUser = null;

function clean(v){return String(v||"").trim()}
function show(id){document.getElementById(id).classList.remove("hidden")}
function hide(id){document.getElementById(id).classList.add("hidden")}

function status(id,msg,type="info"){
  const e=document.getElementById(id);
  e.textContent=msg;
  e.className="status show "+type;
}

async function postToScript(payload){
  const r = await fetch(APPS_SCRIPT_WEB_APP_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload)
  });
  const text = await r.text();
  if(text.trim().startsWith("<")) throw new Error("Apps Script deployment/access issue.");
  return JSON.parse(text);
}

function photoUrl(url){
  if(!url)return "";
  const m=String(url).match(/[-\w]{25,}/);
  return m ? `https://drive.google.com/thumbnail?id=${m[0]}&sz=w120` : url;
}

async function loginUser(){
  const username=clean(document.getElementById("username").value);
  const password=clean(document.getElementById("password").value);

  if(!username||!password){
    status("loginStatus","User name/email ۽ password required.","error");
    return;
  }

  try{
    const res=await postToScript({action:"login",username,password});

    if(!res.success)throw new Error(res.message||"Login failed");

    currentUser=res.user||res;
    loggedInSchoolCode=clean(res.schoolCode || currentUser.schoolCode || currentUser.SchoolCode);

    localStorage.setItem("ibfsUser",JSON.stringify({username,password,schoolCode:loggedInSchoolCode,currentUser}));

    document.getElementById("loggedInSchoolLabel").textContent=loggedInSchoolCode;
    hide("loginPanel");
    show("appPanel");
    await loadDashboard();
    showDashboard();

  }catch(e){
    status("loginStatus",e.message,"error");
  }
}

function logoutUser(){
  localStorage.removeItem("ibfsUser");
  location.reload();
}

window.addEventListener("load",()=>{
  const saved=localStorage.getItem("ibfsUser");
  if(saved){
    try{
      const u=JSON.parse(saved);
      document.getElementById("username").value=u.username||"";
      document.getElementById("password").value=u.password||"";
    }catch(e){}
  }
});

function hideAll(){
  hide("dashboardPanel");
  hide("searchPanel");
  hide("reportsPanel");
  hide("studentForm");
}

function showDashboard(){
  hideAll();
  show("dashboardPanel");
}

function showSearch(){
  hideAll();
  show("searchPanel");
}

function showReports(){
  hideAll();
  show("reportsPanel");
}

async function loadDashboard(){
  try{
    const res=await postToScript({action:"dashboard",schoolCode:loggedInSchoolCode});
    if(!res.success)throw new Error(res.message||"Dashboard failed");

    document.getElementById("totalCount").textContent=res.totalEnrollment||res.total||0;
    document.getElementById("maleCount").textContent=res.male||0;
    document.getElementById("femaleCount").textContent=res.female||0;
    document.getElementById("dropoutCount").textContent=res.dropout||0;
    document.getElementById("passoutCount").textContent=res.passout||0;

    let html="";
    if(res.classWise){
      html="<h3>Class-wise Enrollment</h3><table><tr><th>Class</th><th>Male</th><th>Female</th><th>Total</th></tr>";
      Object.keys(res.classWise).forEach(cls=>{
        const x=res.classWise[cls];
        html+=`<tr><td>${cls}</td><td>${x.male||0}</td><td>${x.female||0}</td><td>${x.total||0}</td></tr>`;
      });
      html+="</table>";
    }
    document.getElementById("classWiseBox").innerHTML=html;

  }catch(e){
    status("mainStatus",e.message,"error");
  }
}

async function searchStudents(){
  const search=clean(document.getElementById("searchText").value);
  const classFilter=document.getElementById("classFilter").value;
  const statusFilter=document.getElementById("statusFilter").value;

  document.getElementById("searchResultCard").innerHTML="";
  document.getElementById("searchStatus").textContent="Searching...";

  try{
    const res=await postToScript({
      action:"searchstudents",
      schoolCode:loggedInSchoolCode,
      search,
      classFilter,
      statusFilter,
      limit:10
    });

    if(!res.success)throw new Error(res.message||"Search failed");

    renderCards(res.students||[]);
    document.getElementById("searchStatus").textContent="Total shown: "+(res.students||[]).length;

  }catch(e){
    document.getElementById("searchStatus").textContent=e.message;
  }
}

function renderCards(students){
  const box=document.getElementById("searchResultCard");
  box.innerHTML="";

  if(!students.length){
    box.innerHTML="<div class='small'>No student found.</div>";
    return;
  }

  students.forEach(s=>{
    const img=photoUrl(s.photo||s.PhotoURL);
    box.innerHTML+=`
      <div class="student-card">
        <div class="student-thumb">${img?`<img src="${img}">`:""}</div>
        <div>
          <b>${s.name||s.StudentName||""}</b>
          <div class="small">
            Father: ${s.father||s.FatherGuardianName||""}<br>
            GR No: ${s.grNo||s.GRNo||""}<br>
            Class: ${s.currentClass||s.CurrentClass||""}<br>
            Status: ${s.status||s.Status||""}
          </div>
        </div>
        <div class="actions" style="margin-top:0">
          <button class="btn btn-primary" onclick="openStudent('${s.uniqueKey||s.UniqueKey}')">Manage</button>
        </div>
      </div>`;
  });
}

async function openStudent(uniqueKey){
  try{
    const res=await postToScript({action:"getstudent",uniqueKey});
    if(!res.success)throw new Error(res.message||"Student not found");
    fillForm(res.student);
  }catch(e){
    status("mainStatus",e.message,"error");
  }
}

function formatDateInput(v){
  if(!v)return "";
  const d=new Date(v);
  if(isNaN(d))return "";
  return d.toISOString().slice(0,10);
}

function fillForm(s){
  hideAll();
  show("studentForm");

  document.getElementById("uniqueKey").value=s.UniqueKey||"";
  document.getElementById("schoolCode").value=s.SchoolCode||"";
  document.getElementById("newSchoolCode").value=s.NewSchoolCode||"";
  document.getElementById("grNo").value=s.GRNo||"";
  document.getElementById("studentName").value=s.StudentName||"";
  document.getElementById("fatherName").value=s.FatherGuardianName||"";
  document.getElementById("gender").value=s.Gender||"";
  document.getElementById("dob").value=formatDateInput(s.DOB);
  document.getElementById("bFormNo").value=s.BFormNo||"";
  document.getElementById("classAdmitted").value=s.ClassAdmitted||"";
  document.getElementById("currentClass").value=s.CurrentClass||"";
  document.getElementById("religion").value=s.Religion||"";
  document.getElementById("address").value=s.ResidentialAddress||"";
  document.getElementById("parentCnic").value=s.ParentCNIC||"";
  document.getElementById("parentContact").value=s.ParentContact||"";
  document.getElementById("emergencyContact").value=s.EmergencyContact||"";
  document.getElementById("dateOfAdmission").value=formatDateInput(s.DateOfAdmission);
  document.getElementById("shift").value=s.Shift||"";
  document.getElementById("status").value=s.Status||"";
  document.getElementById("photoUrl").value=s.PhotoURL||"";
  document.getElementById("remarks").value=s.Remarks||"";
}

async function saveStudent(e){
  e.preventDefault();

  const student={
    UniqueKey:document.getElementById("uniqueKey").value,
    SchoolCode:document.getElementById("schoolCode").value,
    NewSchoolCode:document.getElementById("newSchoolCode").value,
    GRNo:document.getElementById("grNo").value,
    StudentName:document.getElementById("studentName").value,
    FatherGuardianName:document.getElementById("fatherName").value,
    Gender:document.getElementById("gender").value,
    DOB:document.getElementById("dob").value,
    BFormNo:document.getElementById("bFormNo").value,
    ClassAdmitted:document.getElementById("classAdmitted").value,
    CurrentClass:document.getElementById("currentClass").value,
    Religion:document.getElementById("religion").value,
    ResidentialAddress:document.getElementById("address").value,
    ParentCNIC:document.getElementById("parentCnic").value,
    ParentContact:document.getElementById("parentContact").value,
    EmergencyContact:document.getElementById("emergencyContact").value,
    DateOfAdmission:document.getElementById("dateOfAdmission").value,
    Shift:document.getElementById("shift").value,
    Status:document.getElementById("status").value,
    PhotoURL:document.getElementById("photoUrl").value,
    Remarks:document.getElementById("remarks").value
  };

  try{
    const res=await postToScript({
      action:"updatestudent",
      email:currentUser.email||currentUser.Email||"",
      student
    });

    if(!res.success)throw new Error(res.message||"Save failed");
    status("formStatus",res.message||"Saved successfully.","success");
    await loadDashboard();

  }catch(err){
    status("formStatus",err.message,"error");
  }
}

function base64ToBlob(base64,type){
  const bin=atob(base64);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type});
}

async function downloadPdf(type){
  try{
    status("mainStatus","Preparing PDF...","info");

    const res=await postToScript({
      action:"downloadpdf",
      reportType:type,
      schoolCode:loggedInSchoolCode,
      classFilter:document.getElementById("reportClass").value
    });

    if(!res.success)throw new Error(res.message||"PDF failed");
    if(!res.pdfBase64)throw new Error("PDF data not received");

    const blob=base64ToBlob(res.pdfBase64,"application/pdf");
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=res.fileName||"report.pdf";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);

    status("mainStatus","PDF downloaded.","success");

  }catch(e){
    status("mainStatus","PDF failed: "+e.message,"error");
  }
}
</script>
</body>
</html>
